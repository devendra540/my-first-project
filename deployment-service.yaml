apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-first-project
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-first-project
  template:
    metadata:
      labels:
        app: my-first-project
    spec:
      containers:
      - name: my-first-project
        image: my-first-project:latest
        ports:
        - containerPort: 8080
